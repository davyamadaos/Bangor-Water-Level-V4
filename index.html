<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bangor Water Level V3</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
 --bg:#f5f5f5;
 --card:white;
 --text:#111;
}

@media (prefers-color-scheme: dark){
 :root{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f0f0f0;
 }
}

body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 max-width:1100px;
 margin:0 auto;
 padding:20px;
 background:var(--bg);
 color:var(--text);
}

.card{
 background:var(--card);
 border-radius:12px;
 padding:20px;
 margin-bottom:20px;
 box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
 text-align:center;
}

.level{
 font-size:3.5rem;
 font-weight:bold;
}

.trend{
 font-size:1.4rem;
 font-weight:bold;
 margin-top:10px;
}

.green{color:#0a9f3d;}
.red{color:#d62828;}
.orange{color:#f77f00;}
.grey{color:#777;}

.stats{
 display:flex;
 flex-wrap:wrap;
 gap:20px;
}

.stat{
 flex:1;
 min-width:140px;
}

button{
 padding:10px 14px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 margin:3px;
}

.active{
 font-weight:bold;
}

input{
 padding:8px;
 width:120px;
}

canvas{
 max-height:450px;
}

table{
 width:100%;
 border-collapse:collapse;
}

th,td{
 padding:8px;
 border-bottom:1px solid #ddd;
 text-align:left;
}

.footer{
 text-align:center;
 font-size:.9rem;
}

img{
 width:100%;
 border-radius:10px;
}

</style>
</head>

<body>

<h1>Bangor Water Level</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center">

<div>

<div id="currentLevel" class="level">
Loading...
</div>

<div id="trend" class="trend"></div>

<div id="rate"></div>

</div>

<div>
<button onclick="loadData()">🔄 Refresh</button>
</div>

</div>

<hr>

<p>
<strong>Last EPA Observation</strong><br>
<span id="updated"></span>
</p>

<p>
<strong>Observation Age</strong><br>
<span id="dataAge"></span>
</p>

<p>
<strong>Estimated Current Level</strong><br>
<span id="forecastLevel"></span>
</p>

<p>
<strong>Dashboard Refreshed</strong><br>
<span id="syncTime"></span>
</p>

</div>

<div class="card">

<label><strong>Datum Offset (m):</strong></label>

<input id="offset" type="number" step="0.001" value="0">

</div>

<div class="card stats">

<div class="stat">
<strong>24h High</strong><br>
<span id="high24"></span>
</div>

<div class="stat">
<strong>24h Low</strong><br>
<span id="low24"></span>
</div>

<div class="stat">
<strong>24h Range</strong><br>
<span id="range24"></span>
</div>

<div class="stat">
<strong>24h Change</strong><br>
<span id="change24"></span>
</div>

</div>

<div class="card">

<button onclick="setRange('6h')" id="btn6">6h</button>
<button onclick="setRange('12h')" id="btn12">12h</button>
<button onclick="setRange('24h')" id="btn24">24h</button>
<button onclick="setRange('7d')" id="btn7">7d</button>
<button onclick="setRange('3m')" id="btn3">3m</button>

<br><br>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Level Summary</h3>

<table>

<tr>
<th>Time</th>
<th>Level</th>
</tr>

<tr>
<td>6h ago</td>
<td id="level6h"></td>
</tr>

<tr>
<td>3h ago</td>
<td id="level3h"></td>
</tr>

<tr>
<td>Latest Observation</td>
<td id="levelNow"></td>
</tr>

<tr>
<td>Estimated Now</td>
<td id="levelForecast"></td>
</tr>

</table>

</div>

<div class="card">

<h3>EPA Official Graph</h3>

<img
src="PASTE_EPA_GRAPH_URL_HERE"
alt="EPA Graph"
/>

</div>

<div class="card footer">

<p>
<a href="https://epawebapp.epa.ie/hydronet/?_gl=#33008" target="_blank">
EPA Bangor Station
</a>
</p>

<p>
<a href="https://epawebapp.epa.ie/Hydronet/output/internet/stations/CAS/33008/Q/3_months.zip" target="_blank">
Source Data ZIP
</a>
</p>

</div>

<script>

let allData=[];
let chart=null;
let currentRange='12h';

const offsetInput=document.getElementById('offset');

const savedOffset=
localStorage.getItem('datumOffset');

if(savedOffset){
 offsetInput.value=savedOffset;
}

offsetInput.addEventListener('input',()=>{
 localStorage.setItem(
  'datumOffset',
  offsetInput.value
 );
 render();
});

function getOffset(){
 return parseFloat(
  offsetInput.value||0
 );
}

function setRange(r){

 currentRange=r;

 ['6','12','24','7','3'].forEach(v=>{
  const b=document.getElementById('btn'+v);
  if(b) b.classList.remove('active');
 });

 if(r==='6h') btn6.classList.add('active');
 if(r==='12h') btn12.classList.add('active');
 if(r==='24h') btn24.classList.add('active');
 if(r==='7d') btn7.classList.add('active');
 if(r==='3m') btn3.classList.add('active');

 render();
}

async function loadData(){

 try{

  const response=await fetch(
   './data/latest.json?v='+Date.now(),
   {cache:'no-store'}
  );

  const data=await response.json();

  allData=data.rows;

  render();

 }catch(err){

  console.error(err);

 }

}


function render(){

 if(allData.length<2) return;

 const offset=getOffset();

 const latest=
 allData[allData.length-1];

 const previous=
 allData[allData.length-2];

 const latestTime=
 new Date(latest.timestamp);

 const latestLevel=
 latest.absolute+offset;

 document.getElementById(
  'currentLevel'
 ).textContent=
 latestLevel.toFixed(3)+' m';

 /* Current rise/fall rate based on
    last 2 hours (~8 readings) */

 const recent=
 allData.slice(-8);

 const firstRecent=recent[0];
 const lastRecent=
 recent[recent.length-1];

 const hours=
 (
  new Date(lastRecent.timestamp)-
  new Date(firstRecent.timestamp)
 )/3600000;

 const mmPerHr=
 (
  (lastRecent.absolute-
   firstRecent.absolute)
  /hours
 )*1000;

 let trendText='';
 let trendClass='grey';

 if(mmPerHr>2){
  trendText='▲ Rising';
  trendClass='green';
 }
 else if(mmPerHr<-2){
  trendText='▼ Falling';
  trendClass='red';
 }
 else{
  trendText='► Stable';
 }

 const trendEl=
 document.getElementById('trend');

 trendEl.textContent=
 trendText;

 trendEl.className=
 'trend '+trendClass;

 document.getElementById('rate')
 .textContent=
 Math.abs(mmPerHr).toFixed(0)+
 ' mm/hr';

 document.getElementById(
  'updated'
 ).textContent=
 latest.timestamp;

 const now=new Date();

 const ageHours=
 (
  now-latestTime
 )/3600000;

 const forecastLevel=
 latest.absolute+
 ((mmPerHr/1000)*ageHours);

 document.getElementById(
  'forecastLevel'
 ).textContent=
 (forecastLevel+offset)
 .toFixed(3)+' m';

 document.getElementById(
  'syncTime'
 ).textContent=
 now.toLocaleString();

 const ageEl=
 document.getElementById(
  'dataAge'
 );

 ageEl.textContent=
 ageHours.toFixed(1)+
 ' hours';

 if(ageHours<1){
  ageEl.className='green';
 }
 else if(ageHours<6){
  ageEl.className='orange';
 }
 else{
  ageEl.className='red';
 }

 /* 24h stats */

 const values24=
 allData
 .filter(r=>
  latestTime-
  new Date(r.timestamp)
  <=86400000
 )
 .map(r=>
  r.absolute+offset
 );

 const high=
 Math.max(...values24);

 const low=
 Math.min(...values24);

 const range=
 high-low;

 const change=
 values24[
  values24.length-1
 ]-
 values24[0];

 document.getElementById(
  'high24'
 ).textContent=
 high.toFixed(3)+' m';

 document.getElementById(
  'low24'
 ).textContent=
 low.toFixed(3)+' m';

 document.getElementById(
  'range24'
 ).textContent=
 range.toFixed(3)+' m';

 document.getElementById(
  'change24'
 ).textContent=
 (change>=0?'+':'')+
 change.toFixed(3)+' m';

 /* Summary table */

 const level3h=
 allData.findLast(r=>
  latestTime-
  new Date(r.timestamp)
  >=10800000
 );

 const level6h=
 allData.findLast(r=>
  latestTime-
  new Date(r.timestamp)
  >=21600000
 );

 document.getElementById(
  'level3h'
 ).textContent=
 level3h
 ? (level3h.absolute+offset)
   .toFixed(3)+' m'
 : '--';

 document.getElementById(
  'level6h'
 ).textContent=
 level6h
 ? (level6h.absolute+offset)
   .toFixed(3)+' m'
 : '--';

 document.getElementById(
  'levelNow'
 ).textContent=
 latestLevel.toFixed(3)+' m';

 document.getElementById(
  'levelForecast'
 ).textContent=
 (forecastLevel+offset)
 .toFixed(3)+' m';

 /* Range filtering */

 let hoursBack=99999;

 if(currentRange==='6h')
  hoursBack=6;

 if(currentRange==='12h')
  hoursBack=12;

 if(currentRange==='24h')
  hoursBack=24;

 if(currentRange==='7d')
  hoursBack=168;

 let filtered=
 allData;

 if(currentRange!=='3m'){

  filtered=
  allData.filter(r=>
   latestTime-
   new Date(r.timestamp)
   <=hoursBack*3600000
  );

 }

 const labels=
 filtered.map(r=>{

  const d=
  new Date(r.timestamp);

  if(currentRange==='7d'){

   return d.toLocaleDateString(
    undefined,
    {
     weekday:'short'
    }
   );

  }

  if(currentRange==='3m'){

   return d.toLocaleDateString(
    undefined,
    {
     month:'short'
    }
   );

  }

  return d.toLocaleTimeString(
   [],
   {
    hour:'2-digit',
    minute:'2-digit'
   }
  );

 });

 const values=
 filtered.map(r=>
  r.absolute+offset
 );

 /* Forecast extension */

 const forecastData=
 new Array(values.length)
 .fill(null);

 forecastData[
  forecastData.length-1
 ]=
 values[
  values.length-1
 ];

 forecastData.push(
  forecastLevel+offset
 );

 labels.push('Now');

 if(chart){
  chart.destroy();
 }

 chart=new Chart(
  document.getElementById(
   'chart'
  ),
  {

   type:'line',

   data:{

    labels,

    datasets:[

    {
     label:'Observed',

     data:[
      ...values,
      null
     ],

     tension:0.2
    },

    {
     label:'Forecast',

     data:
     forecastData,

     borderDash:[6,6],

     tension:0.2
    }

    ]

   },

   plugins:[{

    id:'valueLabels',

    afterDatasetsDraw(chart){

     const ctx=
     chart.ctx;

     chart.data.datasets
     .forEach(
      (
       dataset,
       index
      )=>{

      const meta=
      chart.getDatasetMeta(
       index
      );

      const points=
      meta.data;

      if(
       !points.length
      ) return;

      let point;
      let value;

      if(index===0){

       point=
       points[
        points.length-2
       ];

       value=
       dataset.data[
        dataset.data.length-2
       ];

      }
      else{

       point=
       points[
        points.length-1
       ];

       value=
       dataset.data[
        dataset.data.length-1
       ];

      }

      if(
       !point ||
       value==null
      ) return;

      ctx.save();

      ctx.font=
      'bold 12px sans-serif';

      ctx.fillText(
       Number(value)
       .toFixed(3)+' m',
       point.x+10,
       point.y-10
      );

      ctx.restore();

     });

    }

   }],

   options:{

    responsive:true,

    maintainAspectRatio:false,

    plugins:{

     legend:{
      display:true
     },

     tooltip:{
      enabled:true
     }

    },

    scales:{

     x:{
      display:true
     }

    }

   }

  }
 );

}

loadData();

setRange('12h');

setInterval(
 loadData,
 900000
);

</script>

</body>
</html>
